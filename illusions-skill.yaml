license: MIT
author: Iktahana
repo: https://github.com/illusions-lab/akutagawa-skill
homepage: https://iktahana.github.io/akutagawa-skill

# === Content tiers (cumulative; 上位 tier 欠落時は対応 asset を skip+warning) ===
tier_1:
  name_ja: 芥川龍之介
  name_romaji: Akutagawa Ryūnosuke
  tagline: 芥川龍之介の文体DNAを、140KBのプロンプトへと蒸留しました。
  portrait: sources/portrait.jpg
  key_kanji: 鬼

tier_2:
  description: 大正期の理知と懐疑——古典・歴史・自伝的短編から蒸留された芥川龍之介の憑依 skill。
  badges: [短編集, 14層DNA, MIT]
  install_command: "npx skills install illusions-lab/akutagawa-skill"

tier_3:
  modes:
    - { icon: writing, name: 書く, desc: 芥川の語彙・構文で新規生成 }
    - { icon: editing, name: 添削, desc: 原稿を芥川の美学で赤入れ }
    - { icon: dialogue, name: 対話, desc: 芥川の世界観で冷徹に応じる }
  key_features:
    - 14 層 × 5 系統（聲・眼・骨・魂・界）の文体 DNA
    - 書く／添削／対話の 3 モード
    - 青空文庫 芥川龍之介 作品集（人物番号 000879）から抽出

tier_4:
  philosophy_ref: sources/content/philosophy.md
  sample_output_ref: sources/content/sample.md
  layer_summary:
    - { id: L1-L3, label: 聲, name: 音 }
    - { id: L4-L6, label: 眼, name: 視点 }
    - { id: L7-L9, label: 骨, name: 構造 }
    - { id: L10-L12, label: 魂, name: 意味 }
    - { id: L13-L14, label: 界, name: 限界 }

tier_5:
  full_layers_ref: SKILL.md
  citations_ref: sources/content/citations.md
  methodology: |
    Corpus: 青空文庫 芥川龍之介 作品集（人物番号 000879）
    Stylometry: fugashi + unidic-lite による形態素解析 + 統計量
    Layers: 14 層 × 5 カテゴリ（聲・眼・骨・魂・界）

